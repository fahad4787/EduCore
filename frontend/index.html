<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/src/assets/DDU-Logo.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0D6E4F" />
    <title>EduCore — University Management</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // GitHub Pages SPA — restore path from ?/login style URLs
      (function () {
        var location = window.location;
        if (location.search[1] === '/') {
          var decoded = location.search
            .slice(1)
            .split('&')
            .map(function (part) {
              return part.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(
            null,
            null,
            location.pathname.slice(0, -1) + decoded + location.hash
          );
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
